name: Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
  workflow_call:

jobs:

  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        unity: ["--unity", ""]
        merge: ["", "--merge"]
        configuration: ["", "-c Release"]

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.x.x

    - name: Test (release)
      run: |
        dotnet run  --project cli ${{ matrix.configuration }} -- build \
          ${{ matrix.unity }} \
          ${{ matrix.merge }} \
          ${{ matrix.configuration }} \
          --force --output  ./.z__merged_dll__ \
          "sample/*.cs" "FinalEnumGenerator/*.cs" "EnvObfuscator/*.cs"  # enquote to prevent expanding

        dnx -y FGenerator.Cli -- build \
          ${{ matrix.unity }} \
          ${{ matrix.merge }} \
          ${{ matrix.configuration }} \
          "test/*.cs" -f -o ./.z__merged_dll__

        dnx -y FGenerator.Cli -- build \
          ${{ matrix.unity }} \
          ${{ matrix.merge }} \
          ${{ matrix.configuration }} \
          "Unity/*.cs" -f -o ./.z__merged_dll__

        ### Tests: Separate build and run to exclude unnecessary warnings from STDOUT ###

        dotnet build         EnvObfuscator.Test   ${{ matrix.configuration }} -p:EmitCompilerGeneratedFiles=true -p:CompilerGeneratedFilesOutputPath="../.generated"
        dotnet run --project EnvObfuscator.Test   ${{ matrix.configuration }} --no-build -v:q -- -md >> $GITHUB_STEP_SUMMARY

        dotnet build         FinalEnumGenerator.Test   ${{ matrix.configuration }} -p:EmitCompilerGeneratedFiles=true -p:CompilerGeneratedFilesOutputPath="../.generated"
        dotnet run --project FinalEnumGenerator.Test   ${{ matrix.configuration }} --no-build -v:q -- -md >> $GITHUB_STEP_SUMMARY

        dotnet build         sandbox   ${{ matrix.configuration }} -p:EmitCompilerGeneratedFiles=true -p:CompilerGeneratedFilesOutputPath="../.generated"
        dotnet run --project sandbox   ${{ matrix.configuration }} --no-build -v:q -- -md >> $GITHUB_STEP_SUMMARY

    - name: Pathfinder
      run:
        ls -al

    - name: Artifact
      uses: actions/upload-artifact@v4
      with:
        name: generated-sources${{ matrix.unity }}${{ matrix.merge }}${{ matrix.configuration }}
        path: ./.generated/**
        include-hidden-files: true
